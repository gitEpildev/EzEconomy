# User GUI configuration for EzEconomy
# Enable opening the user GUI when players run /eco with no arguments
open-on-eco: true

# Per-action enable flags
actions:
  balance: true
  pay: true
  history: true

# Additional options can be added here for future GUI customization
 
# Inventory titles (supports MiniMessage formatting)
title:
  menu: "<green>EzEconomy</green> - <white>Menu"
  pay: "<yellow>EzEconomy</yellow> - <white>Pay"
  history: "<red>EzEconomy</red> - <white>History"
  balance: "<green>Your Balances</green>"
  confirm_pay: "<red>EzEconomy</red> - <white>Confirm Pay"
  pay_to_prefix: "<yellow>EzEconomy</yellow> - <white>Pay to </white>"

# Per-action appearance and text (MiniMessage supported)
actions:
  balance:
    icon: "GOLD_INGOT"
    display-name: "<green>Balance</green>"
    lore:
      - "<gray>View your balances across currencies</gray>"
  pay:
    icon: "PAPER"
    display-name: "<yellow>Pay</yellow>"
    lore:
      - "<gray>Pay another player</gray>"
  history:
    icon: "BOOK"
    display-name: "<red>History</red>"
    lore:
      - "<gray>View recent transactions</gray>"

# Back button configuration
back:
  icon: "ARROW"
  display-name: "<red>Back</red>"
  lore:
    - "<gray>Return to the main menu</gray>"

# Pay GUI specific options
pay:
  # Preset amounts — supports numeric strings or suffixes (k, m, b, t). Examples: "1k", "2.5m", "1000000"
  amounts: ["1","5","10","25","50","100","500","1k","10k","100k","1m","10m","100m","1b"]
  preset:
    icon: "GOLD_NUGGET"
    display-name: "Pay {amount}"
    lore: "Click to pay {amount} to {target}"
  custom:
    icon: "PAPER"
    display-name: "Custom Amount"
    lore:
      - "Click to enter a custom amount via chat"
  # Visual/layout options for a more polished pay GUI
  gui:
    size: 27
  header:
    icon: "PLAYER_HEAD"
    display: "<gold>Paying to</gold> {player}"
    lore: "Click a preset or choose Custom to enter an amount"
  decoration:
    filler-icon: "GRAY_STAINED_GLASS_PANE"
  currency:
    icon: "PAPER"
    selected:
      icon: "EMERALD"
      lore: "Selected"
    display: "Currency: {key}"
    label: "Currency: "
    lore: "Click to select currency"
  # Pay currency selection GUI title prefix
  pay_currency_prefix: "<yellow>EzEconomy</yellow> - <white>Select currency for "
  confirm:
    info:
      display-name: "Confirm Payment"
      lore: "Pay {amount} to {target}"
    confirm:
      icon: "EMERALD"
      display-name: "Confirm"
      lore: "Click to confirm payment"
    cancel:
      icon: "BARRIER"
      display-name: "Cancel"
      lore: "Click to cancel"
  navigation:
    prev:
      icon: "ARROW"
      display-name: "<gold>Previous</gold>"
      lore:
        - "<gray>Go to the previous page</gray>"
    next:
      icon: "ARROW"
      display-name: "<gold>Next</gold>"
      lore:
        - "<gray>Go to the next page</gray>"
