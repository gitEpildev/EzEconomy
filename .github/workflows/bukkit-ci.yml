name: Bukkit module CI

on:
  pull_request:
    paths:
      - 'ezeconomy-bukkit/**'
  push:
    branches:
      - main
      - master
    paths:
      - 'ezeconomy-bukkit/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and test Bukkit module
        run: mvn -B -DskipTests=false -pl ezeconomy-bukkit -am clean test package
