name: Post Coverage Comment

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  post-comment:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download coverage summary artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-summary

      - name: Post coverage summary comment
        # Use repository-level permissions from workflow_run to post comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # workflow_run payload contains the pull requests array; use the first PR
          issue-number: ${{ github.event.workflow_run.pull_requests[0].number }}
          body-file: coverage-summary.md
          edit-mode: replace
