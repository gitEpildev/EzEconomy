name: Unit tests

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'ezeconomy-bungeecord/**'
      - 'ezeconomy-bungeecord-proxy/**'
      - 'ezeconomy-papi/**'
      - 'ezeconomy-bukkit/**'
      - 'ezeconomy-redis/**'
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'ezeconomy-bungeecord/**'
      - 'ezeconomy-bungeecord-proxy/**'
      - 'ezeconomy-papi/**'
      - 'ezeconomy-bukkit/**'
      - 'ezeconomy-redis/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - paper-version: "1.21.11-R0.1-SNAPSHOT"
            mockbukkit-artifactId: "mockbukkit-v1.21"
            mockbukkit-version: "4.101.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ matrix.paper-version }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-${{ matrix.paper-version }}-

      - name: Run unit tests (exclude feature tests) and generate JaCoCo report
        run: mvn -B -Dpaper.version=${{ matrix.paper-version }} -Dmockbukkit.artifactId=${{ matrix.mockbukkit-artifactId }} -Dmockbukkit.version=${{ matrix.mockbukkit-version }} -Dtest='!*FeatureTest' -Dsurefire.failIfNoSpecifiedTests=false test jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: '**/target/site/jacoco/jacoco.xml'
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Compute coverage summary
        run: |
          python3 .github/scripts/coverage_summary.py --metric LINE --output coverage-summary.md

      - name: Upload coverage summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-summary
          path: coverage-summary.md

      - name: Post coverage summary comment on PR
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: coverage-summary.md
          edit-mode: replace
