name: Bungeecord Module CI

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ezeconomy-bungeecord/**'
      - 'ezeconomy-bungeecord-proxy/**'
  push:
    branches: [ main, master ]
    paths:
      - 'ezeconomy-bungeecord/**'
      - 'ezeconomy-bungeecord-proxy/**'

jobs:
  bungeecord-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - paper-version: "1.21.11-R0.1-SNAPSHOT"
            mockbukkit-artifactId: "mockbukkit-v1.21"
            mockbukkit-version: "4.101.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-bungeecord-${{ matrix.paper-version }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-bungeecord-${{ matrix.paper-version }}-

      - name: Run Bungeecord module tests
        run: mvn -B -Dpaper.version=${{ matrix.paper-version }} -Dmockbukkit.artifactId=${{ matrix.mockbukkit-artifactId }} -Dmockbukkit.version=${{ matrix.mockbukkit-version }} -pl ezeconomy-bungeecord,ezeconomy-bungeecord-proxy -am clean test
